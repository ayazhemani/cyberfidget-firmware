name: Compile WASM Emulator

on:
  workflow_dispatch:
    inputs:
      app_sources:
        description: 'Additional app source files to compile (space-separated paths relative to lib/)'
        required: false
        default: ''

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout firmware repo
        uses: actions/checkout@v4

      - name: Cache Emscripten SDK
        uses: actions/cache@v4
        with:
          path: emsdk
          key: emsdk-3.1.51

      - name: Install Emscripten SDK
        run: |
          if [ ! -d "emsdk" ]; then
            git clone https://github.com/emscripten-core/emsdk.git
          fi
          cd emsdk
          ./emsdk install 3.1.51
          ./emsdk activate 3.1.51

      - name: Build WASM
        run: |
          source emsdk/emsdk_env.sh
          cd wasm
          mkdir -p build
          cd build
          emcmake cmake .. -DCMAKE_BUILD_TYPE=Release
          emmake make -j$(nproc)

      - name: Verify output
        run: |
          ls -la wasm/build/cyberfidget.js wasm/build/cyberfidget.wasm
          echo "JS loader size: $(wc -c < wasm/build/cyberfidget.js) bytes"
          echo "WASM binary size: $(wc -c < wasm/build/cyberfidget.wasm) bytes"

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-emulator
          path: |
            wasm/build/cyberfidget.js
            wasm/build/cyberfidget.wasm
          retention-days: 30
